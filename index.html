<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>現ナマには手を出すな</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; font-family: 'Inter', sans-serif; }
        canvas { display: block; touch-action: none; background: #020617; }
        .neon-glow { text-shadow: 0 0 10px #38bdf8, 0 0 20px #38bdf8; }
    </style>
</head>
<body>

    <div id="game-container" class="relative w-full h-screen flex flex-col items-center justify-center">
        <div id="hud" class="absolute top-5 left-5 text-white flex gap-6 text-xl font-bold z-0">
            <div>スコア: <span id="score">0</span></div>
            <div>残り: <span id="lives">3</span></div>
            <div>ステージ: <span id="level">1</span></div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="overlay" class="absolute inset-0 bg-black/80 flex flex-col items-center justify-center text-white z-20">
            <h1 id="msg" class="text-4xl font-bold mb-8 neon-glow">現ナマには手を出すな</h1>
            <button id="start-btn" class="px-8 py-4 bg-sky-600 hover:bg-sky-500 rounded-full text-2xl font-bold transition-all z-30">ゲーム開始</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            if (type === 'hit') {
                osc.type = 'square'; osc.frequency.setValueAtTime(440, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            } else if (type === 'brick') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(880, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            } else if (type === 'gang') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(220, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(660, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
            }
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        const scoreEl = document.getElementById('score'), livesEl = document.getElementById('lives'), levelEl = document.getElementById('level');
        const overlay = document.getElementById('overlay'), startBtn = document.getElementById('start-btn'), msgEl = document.getElementById('msg');

        let score = 0, lives = 3, level = 1, gameRunning = false, animationId, bonusActive = false, bills = [];
        const paddle = { w: 150, h: 20, x: 0, y: 0 };
        const ball = { x: 0, y: 0, radius: 10, dx: 0, dy: 0, speed: 4 };
        let bricks = [], gang = { x: -100, y: 30, w: 40, h: 60, active: false, speed: 4 };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            paddle.y = canvas.height - 60;
            paddle.x = canvas.width / 2 - paddle.w / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        function initBricks() {
            bricks = [];
            const brickRowCount = 3 + Math.min(level - 1, 2);
            const brickColumnCount = 6;
            const brickPadding = 15;
            const width = (Math.min(canvas.width, 800) - (brickColumnCount + 1) * brickPadding) / brickColumnCount;
            const offsetLeft = (canvas.width - (width * brickColumnCount + (brickColumnCount - 1) * brickPadding)) / 2;
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    bricks.push({ x: offsetLeft + c * (width + brickPadding), y: r * 40 + 120, w: width, h: 30, status: 1 });
                }
            }
            gang.active = false;
        }

        function drawStickFigure(x, y) {
            ctx.strokeStyle = '#ef4444';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(x + 20, y + 10, 10, 0, Math.PI * 2); // 頭
            ctx.moveTo(x + 20, y + 20); ctx.lineTo(x + 20, y + 40); // 胴体
            ctx.moveTo(x + 20, y + 25); ctx.lineTo(x + 5, y + 35); // 左腕
            ctx.moveTo(x + 20, y + 25); ctx.lineTo(x + 35, y + 35); // 右腕
            ctx.moveTo(x + 20, y + 40); ctx.lineTo(x + 5, y + 60); // 左足
            ctx.moveTo(x + 20, y + 40); ctx.lineTo(x + 35, y + 60); // 右足
            ctx.stroke();
        }

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (bonusActive) {
                ctx.fillStyle = "#fbbf24";
                bills.forEach(b => {
                    b.y += b.vy; b.x += b.vx;
                    if(b.y > canvas.height) b.y = -20;
                    ctx.save(); ctx.translate(b.x, b.y); ctx.rotate(b.rotation); ctx.fillRect(-20, -10, 40, 20); ctx.restore();
                });
            } else if (gameRunning) {
                ball.x += ball.dx; ball.y += ball.dy;
                if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) { ball.dx *= -1; playSound('hit'); }
                if (ball.y - ball.radius < 0) { ball.dy *= -1; playSound('hit'); }
                if (ball.y + ball.radius > paddle.y && ball.y < paddle.y + paddle.h && ball.x > paddle.x && ball.x < paddle.x + paddle.w) {
                    ball.dy = -Math.abs(ball.dy); ball.dx = (ball.x - (paddle.x + paddle.w / 2)) * 0.15; playSound('hit');
                }
                if (ball.y + ball.radius > canvas.height) { lives--; livesEl.textContent = lives; if (lives <= 0) gameOver(); else resetBall(); }
                
                // ギャングの出現と移動
                if (!gang.active && Math.random() < 0.005) { gang.active = true; gang.x = -60; }
                if (gang.active) {
                    gang.x += gang.speed;
                    if (ball.x > gang.x && ball.x < gang.x + gang.w && ball.y > gang.y && ball.y < gang.y + gang.h) {
                        ball.dy *= -1; gang.active = false; score += 500; scoreEl.textContent = score; playSound('gang');
                    }
                    if (gang.x > canvas.width) gang.active = false;
                }

                let activeBricks = 0;
                bricks.forEach(brick => {
                    if (brick.status === 1) {
                        activeBricks++;
                        if (ball.x > brick.x && ball.x < brick.x + brick.w && ball.y > brick.y && ball.y < brick.y + brick.h) {
                            ball.dy *= -1; brick.status = 0; score += 10; scoreEl.textContent = score; playSound('brick');
                        }
                    }
                });
                if (activeBricks === 0 && bricks.length > 0) triggerBonus();
            }
            
            if (gang.active) drawStickFigure(gang.x, gang.y);
            bricks.forEach(b => { if (b.status === 1) { ctx.fillStyle = '#38bdf8'; ctx.fillRect(b.x, b.y, b.w, b.h); } });
            ctx.fillStyle = '#ffffff'; ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
            if (!bonusActive) { ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2); ctx.fillStyle = '#f472b6'; ctx.fill(); }
            animationId = requestAnimationFrame(update);
        }

        function triggerBonus() {
            bonusActive = true;
            bills = Array.from({length: 40}, () => ({x: Math.random()*canvas.width, y:-Math.random()*canvas.height, vx:(Math.random()-0.5)*2, vy:Math.random()*4+2, rotation:Math.random()*Math.PI*2}));
            setTimeout(() => { bonusActive = false; nextLevel(); }, 5000);
        }
        
        function resetBall() { ball.x = canvas.width / 2; ball.y = paddle.y - 20; const speed = ball.speed + (level * 0.5); ball.dx = speed * (Math.random() > 0.5 ? 1 : -1); ball.dy = -speed; }
        function nextLevel() { level++; levelEl.textContent = level; initBricks(); resetBall(); msgEl.textContent = "現ナマには手を出すな"; startBtn.textContent = "次のステージへ"; overlay.classList.remove('hidden'); gameRunning = false; }
        function gameOver() { gameRunning = false; msgEl.textContent = "ゲームオーバー"; startBtn.textContent = "やり直す"; overlay.classList.remove('hidden'); }
        
        startBtn.addEventListener('click', () => {
            if (msgEl.textContent.includes("ゲームオーバー")) { score=0; lives=3; level=1; scoreEl.textContent=score; livesEl.textContent=lives; levelEl.textContent=level; }
            initBricks(); resetBall(); gameRunning = true; overlay.classList.add('hidden'); if(!animationId) animationId = requestAnimationFrame(update);
        });
        window.addEventListener('mousemove', (e) => { if(!gameRunning || bonusActive) return; paddle.x = Math.max(0, Math.min(e.clientX - paddle.w / 2, canvas.width - paddle.w)); });
    </script>
</body>
</html>
